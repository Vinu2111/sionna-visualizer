<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav #drawer class="app-sidenav" fixedInViewport [mode]="'over'" position="start">
    <mat-toolbar color="primary">Menu</mat-toolbar>
    <div class="drawer-nav-links" *ngIf="authService.isLoggedIn()">
      <button mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">dashboard</mat-icon> Dashboard
      </button>
      <button mat-button routerLink="/history" routerLinkActive="active-link" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">history</mat-icon> History
      </button>
      <button mat-button routerLink="/compare" routerLinkActive="active-link" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">compare_arrows</mat-icon> Compare
      </button>
      <button mat-button routerLink="/api-docs" routerLinkActive="active-link" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">code</mat-icon> API
      </button>

      <button mat-button color="warn" *ngIf="authService.isLoggedIn()" (click)="logout(); drawer.close()">
        <mat-icon style="margin-right: 8px;">logout</mat-icon> Logout
      </button>
    </div>
    
    <div class="drawer-nav-links" *ngIf="!authService.isLoggedIn()">
      <button mat-button routerLink="/login" routerLinkActive="active-link" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">login</mat-icon> Login
      </button>
      <button mat-button routerLink="/api-docs" routerLinkActive="active-link" (click)="drawer.close()">
        <mat-icon style="margin-right: 8px;">code</mat-icon> API
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="main-toolbar">
      <!-- Hamburger menu button (mobile only) -->
      <button mat-icon-button class="mobile-menu-btn" (click)="drawer.toggle()" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>

      <!-- Brand / Logo -->
      <span class="brand-text" routerLink="/">Sionna Visualizer</span>

      <span class="spacer"></span>

      <!-- Desktop Navigation conditionally rendered -->
      <div class="nav-links desktop-only">
        <ng-container *ngIf="authService.isLoggedIn()">
          <button mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
            Dashboard
          </button>
          <button mat-button routerLink="/history" routerLinkActive="active-link">
            History
          </button>
          <button mat-button routerLink="/compare" routerLinkActive="active-link">
            Compare
          </button>
        </ng-container>
        
        <ng-container *ngIf="!authService.isLoggedIn()">
          <button mat-button routerLink="/login" routerLinkActive="active-link">
            Login
          </button>
        </ng-container>

        <button mat-button routerLink="/api-docs" routerLinkActive="active-link" style="margin-left: 8px;">
          <mat-icon style="margin-right: 4px;">code</mat-icon> API
        </button>

        <button mat-stroked-button color="warn" *ngIf="authService.isLoggedIn()" (click)="logout()" style="margin-left: 1rem;">
          Logout
        </button>
      </div>
    </mat-toolbar>

    <!-- Routed Component Body seamlessly loads here conditionally! -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
