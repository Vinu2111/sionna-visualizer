<h2 mat-dialog-title>LaTeX Parameter Table Generator</h2>

<mat-dialog-content class="latex-dialog-content">
  <div class="split-view">
    
    <!-- LEFT PANEL: Auto-extracted parameter preview list -->
    <div class="left-panel">
      <h3>Parameter Preview</h3>
      <table mat-table [dataSource]="parameters" class="mat-elevation-z1 parameter-table">
        
        <!-- Parameter Name Column -->
        <ng-container matColumnDef="parameterName">
          <th mat-header-cell *matHeaderCellDef> Parameter </th>
          <td mat-cell *matCellDef="let element"> {{element.parameterName}} </td>
        </ng-container>

        <!-- Dynamic Value Column -->
        <ng-container matColumnDef="value">
          <th mat-header-cell *matHeaderCellDef> Value </th>
          <td mat-cell *matCellDef="let element"> {{element.value}} </td>
        </ng-container>
        
        <!-- Corresponding Unit Column -->
        <ng-container matColumnDef="unit">
          <th mat-header-cell *matHeaderCellDef> Unit </th>
          <td mat-cell *matCellDef="let element"> {{element.unit}} </td>
        </ng-container>

        <!-- Define standard table row structuring -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <!-- RIGHT PANEL: Full generated text with clipboard action -->
    <div class="right-panel">
      <div class="panel-header">
        <h3>Generated LaTeX</h3>
        <button mat-stroked-button color="primary" (click)="copyLatex()">
          <mat-icon>content_copy</mat-icon> Copy to Clipboard
        </button>
      </div>
      <div class="code-container">
        <!-- Maintain formatting and avoid line-break issues using pre/code tags -->
        <pre><code>{{ generatedLatex }}</code></pre>
      </div>
    </div>
    
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <!-- Friendly secondary action out of wizard -->
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
