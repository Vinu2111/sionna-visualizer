server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT — secret MUST be set via environment variable
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Anthropic AI — set via environment variable
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:NOT_CONFIGURED}

# Python bridge URL
python-bridge:
  url: ${PYTHON_BRIDGE_URL:http://localhost:8001/simulate/demo}

# CORS
cors:
  allowed:
    origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}

# Logging
logging:
  level:
    root: INFO
    com.sionnavisualizer: DEBUG
    org.springframework.web: INFO

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      pythonBridge:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      pythonBridge:
        timeoutDuration: 10s

# Actuator Health Check
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
