services:
  - type: web
    name: sionna-backend
    env: java
    buildCommand: cd backend && ./mvnw package -DskipTests
    startCommand: java -jar backend/target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: PYTHON_BRIDGE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        sync: false

  - type: web
    name: sionna-python-bridge
    env: docker
    dockerfilePath: python-bridge/Dockerfile
    envVars:
      - key: PORT
        value: "8001"
