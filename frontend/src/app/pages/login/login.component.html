<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <mat-card-title>Sionna Visualizer</mat-card-title>
      <mat-card-subtitle>{{ isRegistering ? 'Create a secure new account' : 'Welcome back' }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Conditionally render security issues actively! -->
      <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>

      <!-- Utilizing native Angular Reactive Form Models -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" type="text" placeholder="Enter username" />
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Min 6 characters" />
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">{{ isRegistering ? 'Register' : 'Login' }}</span>
          <mat-spinner *ngIf="isLoading" diameter="20" class="btn-spinner"></mat-spinner>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <div class="toggle-mode">
        <span>{{ isRegistering ? 'Already registered?' : 'Don\'t have an account?' }}</span>
        <button mat-button color="accent" (click)="toggleMode()">
          {{ isRegistering ? 'Sign In' : 'Create account' }}
        </button>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
